services:
  - type: web
    name: ghazal-iraq-chat
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: GHOST_USERNAME
        sync: false
      - key: GHOST_PASSWORD
        sync: false
      - key: METERED_API_KEY
        sync: false
      - key: TURN_SECRET
        sync: false
